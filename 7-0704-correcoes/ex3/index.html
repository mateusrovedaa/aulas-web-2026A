<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de IMC</title>
</head>
<body>
    <h2>Calcule seu Índice de Massa Corporal (IMC)</h2>
    
    <form method="POST" action="processa.php">
        <label for="peso">Peso (kg):</label><br>
        <input type="number" step="0.01" id="peso" name="peso" placeholder="Ex: 70.5" required><br><br>
        
        <label for="altura">Altura (metros):</label><br>
        <input type="number" step="0.01" id="altura" name="altura" placeholder="Ex: 1.75" required><br><br>
        
        <button type="submit">Calcular IMC</button>
    </form>
</body>
</html>
